<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loren's Cottage Care System</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 p-6">

<h1 class="text-3xl font-bold mb-6">Loren's Cottage Care System</h1>

<!-- ================= INPUT AREA ================= -->
<div class="bg-white p-4 rounded shadow space-y-3">

<!-- Child -->
<select id="childSelect" class="w-full border p-2 rounded">
<option value="">Select Child</option>
</select>

<!-- Guardian -->
<select id="guardianSelect" class="w-full border p-2 rounded">
<option value="">Select Guardian</option>
</select>

<!-- Type -->
<select id="typeSelect" class="w-full border p-2 rounded">
<option value="daily">Daily Log</option>
<option value="incident">Incident Report</option>
<option value="feedback">Daily Feedback</option>
</select>

<!-- Text -->
<textarea id="textInput" class="w-full border p-2 rounded" placeholder="Write details..."></textarea>

<button onclick="saveEntry()" class="bg-teal-600 text-white px-4 py-2 rounded">
Save Entry
</button>

</div>

<!-- ================= LOGS ================= -->
<div class="mt-6 bg-white p-4 rounded shadow">
<h2 class="font-bold mb-3">All Records</h2>
<div id="logList" class="space-y-3"></div>
</div>

<script>
/* ================= FULL DATA (FROM YOUR SHEET) ================= */
let state = {
  children: [
    { name: "Xochtli Orda z", guardians: ["Luis Ordaz (Dad)", "Uncle Jeremy", "Tia Nancy"] },
    { name: "Melody Hernandez", guardians: ["Maritza Hernandez (Mom)", "Primo", "Luna Hernandez"] },
    { name: "A'Niya Jackson", guardians: ["Shantaze Jackson", "Desaree Rily", "Keshunda Jackson"] },
    { name: "Truth Sutton", guardians: ["Aleesa Baker", "Joseph Barrientes"] },
    { name: "Gianna Taylor", guardians: ["Dan Taylor", "GiGi Taylor", "Russ Taylor"] }
  ],
  logs: []
};

/* ================= INIT ================= */
function init() {
  const childSelect = document.getElementById("childSelect");
  const guardianSelect = document.getElementById("guardianSelect");

  // load children
  state.children.forEach((c, i) => {
    childSelect.innerHTML += `<option value="${i}">${c.name}</option>`;
  });

  // auto-fill guardians
  childSelect.onchange = function () {
    guardianSelect.innerHTML = "";
    let child = state.children[this.value];
    if (!child) return;

    child.guardians.forEach(g => {
      guardianSelect.innerHTML += `<option value="${g}">${g}</option>`;
    });
  };

  render();
}

/* ================= SAVE ENTRY ================= */
function saveEntry() {
  const childIndex = document.getElementById("childSelect").value;
  const guardian = document.getElementById("guardianSelect").value;
  const type = document.getElementById("typeSelect").value;
  const text = document.getElementById("textInput").value;

  if (childIndex === "" || !text) return;

  state.logs.push({
    id: Date.now(),
    child: state.children[childIndex].name,
    guardian,
    type,
    text,
    date: new Date().toLocaleString()
  });

  document.getElementById("textInput").value = "";
  render();
}

/* ================= RENDER ================= */
function render() {
  const list = document.getElementById("logList");
  list.innerHTML = "";

  state.logs.slice().reverse().forEach(l => {

    let color =
      l.type === "incident" ? "border-red-500" :
      l.type === "feedback" ? "border-blue-500" :
      "border-green-500";

    list.innerHTML += `
      <div class="border-l-4 ${color} bg-white p-3 rounded shadow-sm">
        <div class="text-xs text-gray-500">${l.date}</div>
        <div class="font-bold">${l.child} → ${l.guardian || "No Guardian Selected"}</div>
        <div class="text-xs uppercase">${l.type}</div>
        <div class="mt-1">${l.text}</div>
      </div>
    `;
  });
}

init();
</script>

</body>
</html>
